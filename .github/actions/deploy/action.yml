name: deploy
description: Copy binary and config to host over SSH key auth, then restart application.

inputs:
  host:
    description: SSH host.
    required: true
  port:
    description: SSH port.
    required: true
    default: "22"
  user:
    description: SSH user.
    required: true
  private-key:
    description: SSH private key.
    required: true
  remote-dir:
    description: Application directory on remote host.
    required: true
  binary-path:
    description: Local path to built binary.
    required: true
  binary-name:
    description: Binary file name on remote host.
    required: true
  config-content:
    description: Full application config content.
    required: true
  config-path:
    description: Config path on remote host.
    required: true
  service-name:
    description: systemd service name to restart.
    required: true

runs:
  using: composite
  steps:
    - name: Install deploy tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-client rsync

    - name: Prepare SSH key
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.private-key }}
      run: |
        key_path="$RUNNER_TEMP/payment-service-deploy-key"
        printf '%s\n' "$SSH_PRIVATE_KEY" > "$key_path"
        chmod 600 "$key_path"

    - name: Prepare deploy files
      shell: bash
      env:
        CONFIG_CONTENT: ${{ inputs.config-content }}
      run: |
        deploy_dir="$RUNNER_TEMP/payment-service-deploy"
        rm -rf "$deploy_dir"
        install -d "$deploy_dir"

        printf '%s' "$CONFIG_CONTENT" > "$deploy_dir/config.yaml"
        chmod 600 "$deploy_dir/config.yaml"

        tar -czf "$deploy_dir/migrations.tar.gz" migrations

    - name: Copy binary config and migrations
      shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_USER: ${{ inputs.user }}
        REMOTE_DIR: ${{ inputs.remote-dir }}
        BINARY_PATH: ${{ inputs.binary-path }}
        BINARY_NAME: ${{ inputs.binary-name }}
        CONFIG_PATH: ${{ inputs.config-path }}
      run: |
        key_path="$RUNNER_TEMP/payment-service-deploy-key"
        ssh_opts="-i $key_path -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        rsync_rsh="ssh -i $key_path -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        remote="$SSH_USER@$SSH_HOST"

        # Проверить, что бинарный файл существует
        if [ ! -f "$BINARY_PATH" ]; then
          echo "❌ Ошибка: бинарный файл не найден: $BINARY_PATH"
          ls -la "$(dirname "$BINARY_PATH")" || true
          exit 1
        fi
        if [ ! -f "$(dirname "$BINARY_PATH")/configdsn" ]; then
          echo "❌ Ошибка: бинарный файл configdsn не найден"
          ls -la "$(dirname "$BINARY_PATH")" || true
          exit 1
        fi
        if [ ! -f "$(dirname "$BINARY_PATH")/goose" ]; then
          echo "❌ Ошибка: бинарный файл goose не найден"
          ls -la "$(dirname "$BINARY_PATH")" || true
          exit 1
        fi
        chmod +x "$BINARY_PATH" "$(dirname "$BINARY_PATH")/configdsn" "$(dirname "$BINARY_PATH")/goose"

        ssh $ssh_opts "$remote" "mkdir -p '$REMOTE_DIR' '$(dirname "$CONFIG_PATH")' '$REMOTE_DIR/migrate'"
        rsync -az -e "$rsync_rsh" "$BINARY_PATH" "$remote:$REMOTE_DIR/$BINARY_NAME.new"
        rsync -az -e "$rsync_rsh" "$(dirname "$BINARY_PATH")/configdsn" "$remote:$REMOTE_DIR/migrate/configdsn"
        rsync -az -e "$rsync_rsh" "$(dirname "$BINARY_PATH")/goose" "$remote:$REMOTE_DIR/migrate/goose"
        rsync -az -e "$rsync_rsh" "$RUNNER_TEMP/payment-service-deploy/config.yaml" "$remote:$CONFIG_PATH"
        rsync -az -e "$rsync_rsh" "$RUNNER_TEMP/payment-service-deploy/migrations.tar.gz" "$remote:$REMOTE_DIR/migrations.tar.gz"
        ssh $ssh_opts "$remote" "chmod 660 '$CONFIG_PATH'"

    - name: Run migrations
      shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_USER: ${{ inputs.user }}
        REMOTE_DIR: ${{ inputs.remote-dir }}
        CONFIG_PATH: ${{ inputs.config-path }}
      run: |
        key_path="$RUNNER_TEMP/payment-service-deploy-key"
        ssh_opts="-i $key_path -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        remote="$SSH_USER@$SSH_HOST"
        ssh $ssh_opts "$remote" "
          set -eu
          rm -rf '$REMOTE_DIR/migrate/migrations'
          tar -xzf '$REMOTE_DIR/migrations.tar.gz' -C '$REMOTE_DIR/migrate'
          find '$REMOTE_DIR/migrate' -type d -exec chmod 2775 {} +
          find '$REMOTE_DIR/migrate' -type f -exec chmod ug+rw {} +
          chmod +x '$REMOTE_DIR/migrate/configdsn' '$REMOTE_DIR/migrate/goose'
          dsn=\"\$('$REMOTE_DIR/migrate/configdsn' -config '$CONFIG_PATH')\"
          '$REMOTE_DIR/migrate/goose' -dir '$REMOTE_DIR/migrate/migrations' postgres \"\$dsn\" up
        "

    - name: Restart application
      shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_USER: ${{ inputs.user }}
        REMOTE_DIR: ${{ inputs.remote-dir }}
        BINARY_NAME: ${{ inputs.binary-name }}
        SERVICE_NAME: ${{ inputs.service-name }}
      run: |
        key_path="$RUNNER_TEMP/payment-service-deploy-key"
        ssh_opts="-i $key_path -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        remote="$SSH_USER@$SSH_HOST"
        ssh $ssh_opts "$remote" "
          set -eu
          chmod +x '$REMOTE_DIR/$BINARY_NAME.new'
          mv '$REMOTE_DIR/$BINARY_NAME.new' '$REMOTE_DIR/$BINARY_NAME'
          sudo -n systemctl restart '$SERVICE_NAME'
          sudo -n systemctl --no-pager --full status '$SERVICE_NAME'
        "
