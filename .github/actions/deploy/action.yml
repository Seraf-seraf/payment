name: deploy
description: Upload a release bundle over SSH, run migrations, and restart application.

inputs:
  host:
    description: SSH host.
    required: true
  port:
    description: SSH port.
    required: true
    default: "22"
  user:
    description: SSH user.
    required: true
  private-key:
    description: SSH private key.
    required: true
  remote-dir:
    description: Application directory on remote host.
    required: true
  binary-path:
    description: Local path to built binary.
    required: true
  binary-name:
    description: Binary file name on remote host.
    required: true
  config-content:
    description: Full application config content.
    required: true
  config-path:
    description: Config path on remote host.
    required: true
  service-name:
    description: systemd service name to restart.
    required: true

runs:
  using: composite
  steps:
    - name: Install deploy tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-client rsync

    - name: Prepare SSH key
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.private-key }}
      run: |
        key_path="$RUNNER_TEMP/payment-service-deploy-key"
        printf '%s\n' "$SSH_PRIVATE_KEY" > "$key_path"
        chmod 600 "$key_path"

    - name: Prepare release bundle
      shell: bash
      env:
        BINARY_PATH: ${{ inputs.binary-path }}
        BINARY_NAME: ${{ inputs.binary-name }}
        CONFIG_CONTENT: ${{ inputs.config-content }}
      run: |
        release_dir="$RUNNER_TEMP/payment-service-release"
        rm -rf "$release_dir"
        install -d "$release_dir"

        if [ ! -f "$BINARY_PATH" ]; then
          echo "binary file not found: $BINARY_PATH"
          ls -la "$(dirname "$BINARY_PATH")" || true
          exit 1
        fi
        if [ ! -f "$(dirname "$BINARY_PATH")/configdsn" ]; then
          echo "configdsn binary not found"
          ls -la "$(dirname "$BINARY_PATH")" || true
          exit 1
        fi
        if [ ! -f "$(dirname "$BINARY_PATH")/goose" ]; then
          echo "goose binary not found"
          ls -la "$(dirname "$BINARY_PATH")" || true
          exit 1
        fi

        install -m 755 "$BINARY_PATH" "$release_dir/$BINARY_NAME"
        install -m 755 "$(dirname "$BINARY_PATH")/configdsn" "$release_dir/configdsn"
        install -m 755 "$(dirname "$BINARY_PATH")/goose" "$release_dir/goose"
        cp -R migrations "$release_dir/migrations"
        printf '%s' "$CONFIG_CONTENT" > "$release_dir/config.yaml"
        chmod 640 "$release_dir/config.yaml"

        tar -czf "$RUNNER_TEMP/payment-service-release.tar.gz" -C "$release_dir" .

    - name: Upload and activate release
      shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_USER: ${{ inputs.user }}
        REMOTE_DIR: ${{ inputs.remote-dir }}
        CONFIG_PATH: ${{ inputs.config-path }}
        BINARY_NAME: ${{ inputs.binary-name }}
        SERVICE_NAME: ${{ inputs.service-name }}
      run: |
        key_path="$RUNNER_TEMP/payment-service-deploy-key"
        release_id="${GITHUB_SHA:-manual-$(date +%Y%m%d%H%M%S)}"
        bundle_path="$RUNNER_TEMP/payment-service-release.tar.gz"
        remote="$SSH_USER@$SSH_HOST"
        ssh_opts="-i $key_path -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        rsync_rsh="ssh -i $key_path -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"

        ssh $ssh_opts "$remote" "mkdir -p '$REMOTE_DIR/releases' '$(dirname "$CONFIG_PATH")'"
        rsync -az -e "$rsync_rsh" "$bundle_path" "$remote:$REMOTE_DIR/releases/$release_id.tar.gz"

        ssh $ssh_opts "$remote" \
          "REMOTE_DIR='$REMOTE_DIR' CONFIG_PATH='$CONFIG_PATH' BINARY_NAME='$BINARY_NAME' SERVICE_NAME='$SERVICE_NAME' RELEASE_ID='$release_id' bash -s" <<'REMOTE'
        set -eu

        release_dir="$REMOTE_DIR/releases/$RELEASE_ID"
        rm -rf "$release_dir"
        mkdir -p "$release_dir"
        tar -xzf "$REMOTE_DIR/releases/$RELEASE_ID.tar.gz" -C "$release_dir"

        chmod +x "$release_dir/$BINARY_NAME" "$release_dir/configdsn" "$release_dir/goose"
        install -m 640 "$release_dir/config.yaml" "$CONFIG_PATH"
        chgrp payment-deploy "$CONFIG_PATH"

        dsn="$("$release_dir/configdsn" -config "$CONFIG_PATH")"
        "$release_dir/goose" -dir "$release_dir/migrations" postgres "$dsn" up

        install -m 755 "$release_dir/$BINARY_NAME" "$REMOTE_DIR/$BINARY_NAME.new"
        mv "$REMOTE_DIR/$BINARY_NAME.new" "$REMOTE_DIR/$BINARY_NAME"
        sudo -n systemctl restart "$SERVICE_NAME"
        sudo -n systemctl --no-pager --full status "$SERVICE_NAME"
        REMOTE
