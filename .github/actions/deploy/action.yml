name: deploy
description: Copy binary and config to host over SSH password auth, then restart application.

inputs:
  host:
    description: SSH host.
    required: true
  port:
    description: SSH port.
    required: true
    default: "22"
  user:
    description: SSH user.
    required: true
  password:
    description: SSH password.
    required: true
  remote-dir:
    description: Application directory on remote host.
    required: true
  binary-path:
    description: Local path to built binary.
    required: true
  binary-name:
    description: Binary file name on remote host.
    required: true
  config-content:
    description: Full application config content.
    required: true
  config-path:
    description: Config path on remote host.
    required: true
  service-name:
    description: systemd service name to restart.
    required: true

runs:
  using: composite
  steps:
    - name: Install sshpass
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass

    - name: Prepare deploy files
      shell: bash
      env:
        CONFIG_CONTENT: ${{ inputs.config-content }}
      run: |
        deploy_dir="$RUNNER_TEMP/payment-service-deploy"
        rm -rf "$deploy_dir"
        install -d "$deploy_dir"

        printf '%s' "$CONFIG_CONTENT" > "$deploy_dir/config.yaml"
        chmod 600 "$deploy_dir/config.yaml"

        tar -czf "$deploy_dir/migrations.tar.gz" \
          Makefile \
          go.mod \
          go.sum \
          cmd/configdsn \
          pkg/config \
          migrations

    - name: Copy binary config and migrations
      shell: bash
      env:
        SSHPASS: ${{ inputs.password }}
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_USER: ${{ inputs.user }}
        REMOTE_DIR: ${{ inputs.remote-dir }}
        BINARY_PATH: ${{ inputs.binary-path }}
        BINARY_NAME: ${{ inputs.binary-name }}
        CONFIG_PATH: ${{ inputs.config-path }}
      run: |
        ssh_opts="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        remote="$SSH_USER@$SSH_HOST"

        # Проверить, что бинарный файл существует
        if [ ! -f "$BINARY_PATH" ]; then
          echo "❌ Ошибка: бинарный файл не найден: $BINARY_PATH"
          ls -la "$(dirname "$BINARY_PATH")" || true
          exit 1
        fi

        sshpass -e ssh $ssh_opts "$remote" "mkdir -p '$REMOTE_DIR' '$(dirname "$CONFIG_PATH")' '$REMOTE_DIR/migrate'"
        sshpass -e scp $ssh_opts "$BINARY_PATH" "$remote:$REMOTE_DIR/$BINARY_NAME.new"
        sshpass -e scp $ssh_opts "$RUNNER_TEMP/payment-service-deploy/config.yaml" "$remote:$CONFIG_PATH"
        sshpass -e scp $ssh_opts "$RUNNER_TEMP/payment-service-deploy/migrations.tar.gz" "$remote:$REMOTE_DIR/migrations.tar.gz"

    - name: Run migrations
      shell: bash
      env:
        SSHPASS: ${{ inputs.password }}
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_USER: ${{ inputs.user }}
        REMOTE_DIR: ${{ inputs.remote-dir }}
        CONFIG_PATH: ${{ inputs.config-path }}
      run: |
        ssh_opts="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        remote="$SSH_USER@$SSH_HOST"
        sshpass -e ssh $ssh_opts "$remote" "
          set -eu
          rm -rf '$REMOTE_DIR/migrate'
          mkdir -p '$REMOTE_DIR/migrate'
          tar -xzf '$REMOTE_DIR/migrations.tar.gz' -C '$REMOTE_DIR/migrate'
          cd '$REMOTE_DIR/migrate'
          CONFIG_PATH='$CONFIG_PATH' make migrate-up
        "

    - name: Restart application
      shell: bash
      env:
        SSHPASS: ${{ inputs.password }}
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_USER: ${{ inputs.user }}
        REMOTE_DIR: ${{ inputs.remote-dir }}
        BINARY_NAME: ${{ inputs.binary-name }}
        SERVICE_NAME: ${{ inputs.service-name }}
      run: |
        ssh_opts="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT"
        remote="$SSH_USER@$SSH_HOST"
        sshpass -e ssh $ssh_opts "$remote" "
          set -eu
          chmod +x '$REMOTE_DIR/$BINARY_NAME.new'
          mv '$REMOTE_DIR/$BINARY_NAME.new' '$REMOTE_DIR/$BINARY_NAME'
          sudo -n systemctl restart '$SERVICE_NAME'
          sudo -n systemctl --no-pager --full status '$SERVICE_NAME'
        "
