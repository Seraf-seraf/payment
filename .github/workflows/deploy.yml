name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test, fmt and vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION }}
          cache: true

      - name: Run checks
        uses: ./.github/actions/test

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION }}
          cache: true

      - name: Build
        uses: ./.github/actions/build
        with:
          app-name: ${{ vars.APP_NAME }}
          output-dir: ${{ vars.BUILD_DIR }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.ARTIFACT_NAME }}
          path: ${{ vars.BUILD_DIR }}/${{ vars.APP_NAME }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to hosting
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ vars.ARTIFACT_NAME }}
          path: ${{ vars.BUILD_DIR }}

      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          user: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          remote-dir: ${{ vars.REMOTE_DIR }}
          binary-path: ${{ vars.BUILD_DIR }}/${{ vars.APP_NAME }}
          binary-name: ${{ vars.APP_NAME }}
          config-content: ${{ secrets.APP_CONFIG }}
          config-path: ${{ vars.REMOTE_CONFIG_PATH }}
